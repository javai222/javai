name: Build Java Files

on:
    push:
      branches: [ main, develop-* ]
    pull_request:
      branches: [ main, develop-* ]

  jobs:
    build-labs:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup Java
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '21'

        - name: Compile Non-Maven Labs
          run: |
            set -e
            mkdir -p bin
            find . -name "*.java" ! -path "*/springboot-lab/*" > sources.txt
            if [ -s sources.txt ]; then
              javac -d bin -cp bin @sources.txt
            fi

    build-springboot:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup Java
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: '21'
            cache: maven

        - name: Build with Maven
          run: |
            if [ -f springboot-lab/pom.xml ]; then
              cd springboot-lab && mvn -B package -DskipTests
            elif [ -f pom.xml ]; then
              mvn -B package -DskipTests
            fi
